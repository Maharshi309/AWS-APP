<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-start: #1a1a2e;
            --gradient-mid: #16213e;
            --gradient-end: #0f3460;
            --accent: #e94560;
            --accent-light: #ff6b8a;
            --card-bg: #ffffff;
            --surface: #f8f9fc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--surface);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* ── Header ───────────────────────────────────────── */
        .app-header {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-mid) 50%, var(--gradient-end) 100%);
            padding: 2.5rem 2rem 5rem;
            position: relative;
            overflow: hidden;
        }

        .app-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(233, 69, 96, 0.12);
            animation: pulse-bg 6s ease-in-out infinite;
        }

        .app-header::after {
            content: '';
            position: absolute;
            bottom: -40%;
            right: -10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(99, 179, 237, 0.10);
            animation: pulse-bg 8s ease-in-out infinite reverse;
        }

        @keyframes pulse-bg {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        .app-header h1 {
            color: #fff;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .app-header p {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
        }

        .header-logo {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #fff;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            position: relative;
            z-index: 1;
        }

        /* ── Stats Cards ──────────────────────────────────── */
        .stats-row {
            margin-top: -3rem;
            position: relative;
            z-index: 10;
            padding: 0 1.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.4rem 1.5rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.09);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: default;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.14);
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .stat-num {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        /* ── Main Content ────────────────────────────────── */
        .main-content {
            padding: 2rem 1.5rem 3rem;
        }

        /* ── Search + Action Bar ─────────────────────────── */
        .toolbar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-wrapper {
            position: relative;
            flex: 1 1 260px;
        }

        .search-wrapper .fa-search {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .search-input {
            padding-left: 38px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            height: 44px;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.12);
            outline: none;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0 1.3rem;
            height: 44px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            white-space: nowrap;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.35);
            color: #fff;
        }

        .btn-add:active {
            transform: scale(0.97);
        }

        /* ── Table Card ──────────────────────────────────── */
        .table-card {
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .table-card table {
            margin-bottom: 0;
        }

        .table-card thead th {
            background: #f1f5f9;
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1.5px solid var(--border);
            padding: 1rem 1.2rem;
        }

        .table-card tbody td {
            padding: 1rem 1.2rem;
            font-size: 0.9rem;
            vertical-align: middle;
            border-bottom: 1px solid #f0f3f8;
        }

        .table-card tbody tr {
            transition: background 0.18s;
        }

        .table-card tbody tr:hover {
            background: #fafbfe;
        }

        .table-card tbody tr:last-child td {
            border-bottom: none;
        }

        /* Animated row entry */
        @keyframes row-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-row {
            animation: row-in 0.3s ease both;
        }

        /* Avatar badge */
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
            flex-shrink: 0;
        }

        /* Course badge */
        .course-badge {
            background: #ede9fe;
            color: #6d28d9;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        /* Action Buttons */
        .btn-edit {
            background: #eff6ff;
            color: #2563eb;
            border: none;
            border-radius: 9px;
            padding: 6px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-edit:hover {
            background: #dbeafe;
            transform: scale(1.05);
        }

        .btn-del {
            background: #fff1f2;
            color: var(--accent);
            border: none;
            border-radius: 9px;
            padding: 6px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-del:hover {
            background: #ffe4e6;
            transform: scale(1.05);
        }

        /* ── Empty State ────────────────────────────────── */
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
        }

        .empty-state .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ── Loading Spinner ────────────────────────────── */
        .loading-row td {
            padding: 3rem !important;
            text-align: center;
        }

        .spinner-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .custom-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f2f5;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Toast Notifications ────────────────────────── */
        .toast-stack {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .app-toast {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1e293b;
            color: #fff;
            border-radius: 14px;
            padding: 14px 18px;
            min-width: 280px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            animation: toast-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .app-toast.removing {
            animation: toast-out 0.3s ease forwards;
        }

        @keyframes toast-in {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toast-out {
            to {
                opacity: 0;
                transform: translateY(10px);
            }
        }

        .toast-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .toast-icon.success {
            background: #22c55e;
        }

        .toast-icon.error {
            background: var(--accent);
        }

        .toast-msg {
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.35;
        }

        /* ── Modal ──────────────────────────────────────── */
        .modal-content {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-bottom: none;
            padding: 1.5rem 1.8rem;
        }

        .modal-title {
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .modal-header .btn-close {
            filter: invert(1);
            opacity: 0.7;
        }

        .modal-body {
            padding: 1.8rem;
        }

        .modal-footer {
            border-top: 1.5px solid var(--border);
            padding: 1rem 1.5rem;
        }

        .form-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-control {
            border-radius: 10px;
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            padding: 10px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.12);
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .input-with-icon .form-control {
            padding-left: 36px;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(233, 69, 96, 0.35);
            color: #fff;
        }

        .btn-cancel {
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* ── Confirm Delete Modal ───────────────────────── */
        .confirm-modal .modal-content {
            border-radius: 20px;
        }

        .confirm-modal .modal-body {
            text-align: center;
            padding: 2rem;
        }

        .confirm-icon {
            width: 72px;
            height: 72px;
            background: #fff1f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--accent);
            margin: 0 auto 1rem;
        }

        .btn-confirm-del {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-confirm-del:hover {
            background: #c73652;
            color: #fff;
        }

        /* ── Scrollbar ──────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- ────────────── Header ────────────── -->
    <div class="app-header">
        <div class="container-xl">
            <div class="d-flex align-items-center gap-3 mb-3">
                <div class="header-logo">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div>
                    <h1 class="mb-0">Student Management</h1>
                    <p class="mb-0">Manage all enrolled students in one place</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ────────────── Stats Row ────────────── -->
    <div class="stats-row">
        <div class="container-xl">
            <div class="row g-3">
                <div class="col-6 col-md-3">
                    <div class="stat-card d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:#fff0f3;">
                            <i class="fas fa-users" style="color:#e94560;"></i>
                        </div>
                        <div>
                            <div class="stat-num" id="stat-total">–</div>
                            <div class="stat-label">Total Students</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:#eff6ff;">
                            <i class="fas fa-book-open" style="color:#2563eb;"></i>
                        </div>
                        <div>
                            <div class="stat-num" id="stat-courses">–</div>
                            <div class="stat-label">Courses</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:#f0fdf4;">
                            <i class="fas fa-envelope" style="color:#16a34a;"></i>
                        </div>
                        <div>
                            <div class="stat-num" id="stat-new">–</div>
                            <div class="stat-label">Showing</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:#fdf4ff;">
                            <i class="fas fa-search" style="color:#9333ea;"></i>
                        </div>
                        <div>
                            <div class="stat-num" id="stat-search">All</div>
                            <div class="stat-label">Filter Active</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ────────────── Main Content ────────────── -->
    <div class="main-content">
        <div class="container-xl">

            <!-- Toolbar -->
            <div class="toolbar mb-4">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="searchInput"
                        placeholder="Search by name, email or course…" oninput="filterStudents()">
                </div>
                <button class="btn btn-add" onclick="openAddModal()" id="addStudentBtn">
                    <i class="fas fa-plus"></i> Add Student
                </button>
            </div>

            <!-- Table -->
            <div class="table-card">
                <div class="table-responsive">
                    <table class="table" id="studentTable">
                        <thead>
                            <tr>
                                <th style="width:50px;">#</th>
                                <th>Student</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Course</th>
                                <th style="width:160px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <tr class="loading-row">
                                <td colspan="6">
                                    <div class="spinner-wrap">
                                        <div class="custom-spinner"></div>
                                        <span style="color:var(--text-muted); font-size:0.88rem;">Loading
                                            students…</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- ────────────── Toast Stack ────────────── -->
    <div class="toast-stack" id="toastStack"></div>

    <!-- ────────────── Add/Edit Modal ────────────── -->
    <div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="studentModalLabel">
                        <i class="fas fa-user-plus me-2"></i> Add Student
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="studentForm" novalidate>
                        <input type="hidden" id="studentId">

                        <div class="mb-3">
                            <label class="form-label">Full Name <span class="text-danger">*</span></label>
                            <div class="input-with-icon">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" class="form-control" id="name" placeholder="e.g. Jane Doe" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address <span class="text-danger">*</span></label>
                            <div class="input-with-icon">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" class="form-control" id="email" placeholder="e.g. jane@example.com"
                                    required>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label">Phone</label>
                                <div class="input-with-icon">
                                    <i class="fas fa-phone input-icon"></i>
                                    <input type="text" class="form-control" id="phone"
                                        placeholder="e.g. +91 9876543210">
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Course</label>
                                <div class="input-with-icon">
                                    <i class="fas fa-graduation-cap input-icon"></i>
                                    <input type="text" class="form-control" id="course"
                                        placeholder="e.g. Computer Science">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer justify-content-between">
                    <button type="button" class="btn btn-light btn-cancel" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-save" id="saveStudentBtn" onclick="saveStudent()">
                        <span id="saveBtnText">Save Student</span>
                        <span id="saveBtnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"
                            role="status"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ────────────── Delete Confirm Modal ────────────── -->
    <div class="modal fade confirm-modal" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-body">
                    <div class="confirm-icon">
                        <i class="fas fa-trash-alt"></i>
                    </div>
                    <h5 class="fw-700 mb-1" style="font-weight:700;">Delete Student?</h5>
                    <p class="text-muted" style="font-size:0.88rem;" id="deleteStudentName">This action cannot be
                        undone.</p>
                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button class="btn btn-light px-4 btn-cancel" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-confirm-del px-4" id="confirmDeleteBtn">
                            <span id="delBtnText">Delete</span>
                            <span id="delBtnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"
                                role="status"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
